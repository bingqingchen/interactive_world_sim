defaults:
  - base_dataset

dataset_dir: data/robosuite/lift
horizon: 16
val_horizon: 16
aug_mode: none
skip_frame: 1
pad_after: 7
pad_before: 1
rotation_rep: rotation_6d
seed: 42
skip_idx: 4
use_cache: true
resolution: 128
obs_keys: [camera_0_color, camera_1_color]
low_dim_keys: []
action_mode: single_grasp
goal_sample: intermediate
shape_meta:
  action:
    shape:
    - 4
  obs:
    camera_0_color:
      shape:
      - 3 # C
      - 128 # H
      - 128 # W
      type: rgb
    camera_1_color:
      shape:
      - 3 # C
      - 128 # H
      - 128 # W
      type: rgb
